<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitnessAGNT – Reset Password</title>
  <meta name="description" content="Set a new password for your FitnessAGNT account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="bg-particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="auth-wrapper" style="justify-content:center;">
    <div class="auth-card glass" style="max-width:440px;width:100%;">

      <div style="text-align:center;margin-bottom:28px;">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="url(#rg1)" stroke-width="2.5"/>
          <path d="M14 24h4l3-8 4 16 3-10 2 2h4" stroke="url(#rg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="rg1" x1="2" y1="2" x2="46" y2="46" gradientUnits="userSpaceOnUse"><stop stop-color="#00e5ff"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
            <linearGradient id="rg2" x1="14" y1="16" x2="34" y2="32" gradientUnits="userSpaceOnUse"><stop stop-color="#00e5ff"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
          </defs>
        </svg>
        <h1 style="margin:12px 0 2px;font-size:1.5rem;">FitnessAGNT</h1>
        <h2 style="margin:0 0 4px;font-size:1.2rem;font-weight:500;">Set New Password</h2>
        <p style="color:var(--text-3);font-size:14px;">Enter a strong new password for your account</p>
      </div>

      <div id="reset-alert" class="auth-alert hidden" role="alert"></div>

      <div id="reset-form">
        <div class="field-group">
          <label for="new-pass">New Password</label>
          <div class="input-wrap">
            <input type="password" id="new-pass" placeholder="Min. 6 characters" autocomplete="new-password" />
            <button type="button" class="toggle-pw" onclick="togglePw('new-pass',this)">Show</button>
          </div>
        </div>
        <div class="field-group">
          <label for="confirm-pass">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirm-pass" placeholder="Repeat password" autocomplete="new-password" />
          </div>
        </div>
        <button type="button" id="btn-reset" class="btn-primary" onclick="handleReset()">
          <span class="btn-text">Update Password</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>

      <div id="reset-success" class="hidden" style="text-align:center;padding:20px 0;">
        <div style="font-size:48px;margin-bottom:12px;">✅</div>
        <h3 style="color:var(--success);margin-bottom:8px;">Password Updated!</h3>
        <p style="color:var(--text-3);font-size:14px;">Redirecting you to sign in…</p>
      </div>

    </div>
  </div>

  <script>
    // Read token from URL
    const urlToken = new URLSearchParams(window.location.search).get('token') || '';

    function showAlert(msg, type='error') {
      const el = document.getElementById('reset-alert');
      el.textContent = msg;
      el.className = `auth-alert ${type}`;
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type='text'; btn.textContent='Hide'; }
      else { inp.type='password'; btn.textContent='Show'; }
    }

    async function handleReset() {
      const newPass  = document.getElementById('new-pass').value;
      const confirm  = document.getElementById('confirm-pass').value;
      if (!newPass || !confirm) { showAlert('Please fill in both fields.'); return; }
      if (newPass !== confirm)  { showAlert('Passwords do not match.'); return; }
      if (newPass.length < 6)   { showAlert('Password must be at least 6 characters.'); return; }
      if (!urlToken)            { showAlert('Invalid or missing reset token.'); return; }

      const btn = document.getElementById('btn-reset');
      const txt = btn.querySelector('.btn-text');
      const ldr = btn.querySelector('.btn-loader');
      btn.disabled=true; txt.classList.add('hidden'); ldr.classList.remove('hidden');

      try {
        const res  = await fetch('/api/reset_password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: urlToken, new_password: newPass })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('reset-form').classList.add('hidden');
          document.getElementById('reset-alert').classList.add('hidden');
          document.getElementById('reset-success').classList.remove('hidden');
          setTimeout(() => { window.location.href = 'index.html'; }, 2500);
        } else {
          showAlert(data.error || 'Password reset failed. The link may have expired.');
          btn.disabled=false; txt.classList.remove('hidden'); ldr.classList.add('hidden');
        }
      } catch {
        showAlert('Could not reach the server. Make sure app.py is running.');
        btn.disabled=false; txt.classList.remove('hidden'); ldr.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
